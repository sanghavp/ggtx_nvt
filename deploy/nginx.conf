server {
    listen 80;
    server_name nvt.sanghh.space; # Đã thay thế bằng domain thực tế

    # Chuyển hướng HTTP sang HTTPS
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Bỏ comment block dưới sau khi cài SSL bằng Certbot
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/nvt.sanghh.space/fullchain.pem; # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/nvt.sanghh.space/privkey.pem; # managed by Certbot
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Cấu hình proxy cho Next.js server (đang chạy cổng 3001 bằng PM2)
    location / {
        proxy_pass http://localhost:3001; # Đã đổi sang port 3001
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cấu hình cache tĩnh cho thư mục _next/static của Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3001; # Đã đổi sang port 3001
        proxy_cache_valid 60m;
        expires 365d;
        access_log off;
    }

    # Cấu hình cache cho thư mục uploads ảnh (đã được next.js serve nếu để trong public)
    location /uploads/ {
        # alias /var/www/ggtx_nvt/public/uploads/; # Có thể map thẳng vào thư mục lấy files
        proxy_pass http://localhost:3001; # Đã đổi sang port 3001
        expires 30d;
        access_log off;
    }
}
